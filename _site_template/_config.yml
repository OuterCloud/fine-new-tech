theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: "DailyPulse"
tagline: "AI 驱动的中英双语每日技术简报"
description: >-
  聚合 GitHub Trending、Hacker News、arXiv、Product Hunt 与财经要闻，由 AI 每日生成中英双语简报。

url: "https://outercloud.github.io"
baseurl: "/new-tech"

github:
  username: OuterCloud

social:
  name: DailyPulse
  email: runcheck1@163.com
  links:
    - https://github.com/OuterCloud/daily-pulse

# 文章目录
toc: true

# 主题模式（留空跟随系统）
theme_mode:

# 头像（可选，留空不显示）
avatar: "/assets/img/avatar.png"

comments:
  provider:

analytics:
  google:
    id:

paginate: 10

permalink: /posts/:title/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
